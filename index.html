<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Log Pattern Analyzer</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #fafafa; }
    h1 { color: #333; }
    #results { margin-top: 20px; }
    .pattern { background: #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>AI Log Pattern Analyzer</h1>
  
  <!-- Upload log file -->
  <input type="file" id="logFile" accept=".log,.txt" />
  <button id="analyzeBtn">Analyze Log</button>
  
  <!-- Results display -->
  <div id="results"></div>

  <!-- Link JS file -->
  <script src="app.js"></script>
</body>
</html>
